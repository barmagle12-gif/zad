<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <title>زاد المسلم - رفيق رمضان</title>
    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        const isDark = saved ? saved === 'dark' : true;
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body class="min-h-screen relative bg-[#fdfcf0] dark:bg-[#0a0a0a] text-slate-800 dark:text-gray-100 overflow-x-hidden theme-transition">
    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        const isDark = saved ? saved === 'dark' : true;
        if (isDark) {
          document.body.classList.add('dark');
        } else {
          document.body.classList.remove('dark');
        }
      })();
    </script>
    <div class="zaina-cord"></div>
    <div class="fixed inset-0 islamic-pattern pointer-events-none z-0"></div>
    <div id="root" class="relative z-10"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
