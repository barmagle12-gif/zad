name: android-build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Allow using a repo-level token stored in Secrets (MY_GITHUB_TOKEN)
permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      # Use the repository secret if available; otherwise the workflow will still have GITHUB_TOKEN
      GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      NPM_CONFIG_OPTIONAL: 'false'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies (no optional)
        run: npm ci --no-optional

      - name: Build Web Assets
        run: npm run build --if-present

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sync Capacitor Android
        run: |
          npx cap sync android || npx cap add android && npx cap sync android

      - name: Build Android APK (Gradle)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk