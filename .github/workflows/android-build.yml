name: android-build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Signed Android APK
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --force
          npm install @rollup/rollup-linux-x64-gnu --save-dev

      - name: Build Web Assets
        run: npm run build --if-present

      - name: Setup Java (v21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Sync Capacitor Android
        run: |
          npx cap sync android || (npx cap add android && npx cap sync android)

      - name: Decode Keystore
        run: |
          # فك التشفير ووضع الملف في مكان ثابت ومعروف
          echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/alnomany.keystore

      - name: Build and Sign APK (Release)
        working-directory: android
        run: |
          chmod +x ./gradlew
          # المرة دي بنعطي Gradle المسار الكامل للملف عشان ميتوهش
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/alnomany.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEYSTORE_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Alnomany-Zad-Signed-APK
          path: android/app/build/outputs/apk/release/*.apk